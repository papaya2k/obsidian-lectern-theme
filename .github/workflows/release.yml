name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag ($tag) does not match manifest.json version ($manifest_version)"
            exit 1
          fi

      - name: Create release with theme assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            manifest.json
            theme.css
